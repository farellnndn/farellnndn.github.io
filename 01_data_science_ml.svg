<svg viewBox="0 0 200 200" width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="24" fill="#EBF3FF"/>

  <!-- Input to hidden connections -->
  <g stroke="#B3D1FF" stroke-width="1.2" opacity="0.65">
    <line x1="44" y1="58" x2="100" y2="42"/>
    <line x1="44" y1="58" x2="100" y2="80"/>
    <line x1="44" y1="58" x2="100" y2="120"/>
    <line x1="44" y1="100" x2="100" y2="42"/>
    <line x1="44" y1="100" x2="100" y2="80"/>
    <line x1="44" y1="100" x2="100" y2="120"/>
    <line x1="44" y1="100" x2="100" y2="158"/>
    <line x1="44" y1="142" x2="100" y2="80"/>
    <line x1="44" y1="142" x2="100" y2="120"/>
    <line x1="44" y1="142" x2="100" y2="158"/>
  </g>

  <!-- Hidden to output connections -->
  <g stroke="#80B3FF" stroke-width="1.2" opacity="0.75">
    <line x1="100" y1="42" x2="158" y2="72"/>
    <line x1="100" y1="42" x2="158" y2="128"/>
    <line x1="100" y1="80" x2="158" y2="72"/>
    <line x1="100" y1="80" x2="158" y2="128"/>
    <line x1="100" y1="120" x2="158" y2="72"/>
    <line x1="100" y1="120" x2="158" y2="128"/>
    <line x1="100" y1="158" x2="158" y2="128"/>
  </g>

  <!-- Input nodes -->
  <circle cx="44" cy="58"  r="12" fill="#E0EEFF" stroke="#80B3FF" stroke-width="2.5"/>
  <circle cx="44" cy="100" r="12" fill="#E0EEFF" stroke="#80B3FF" stroke-width="2.5"/>
  <circle cx="44" cy="142" r="12" fill="#E0EEFF" stroke="#80B3FF" stroke-width="2.5"/>

  <!-- Hidden nodes -->
  <circle cx="100" cy="42"  r="13" fill="#80B3FF" stroke="#4D94FF" stroke-width="2.5"/>
  <circle cx="100" cy="80"  r="13" fill="#80B3FF" stroke="#4D94FF" stroke-width="2.5"/>
  <circle cx="100" cy="120" r="13" fill="#80B3FF" stroke="#4D94FF" stroke-width="2.5"/>
  <circle cx="100" cy="158" r="13" fill="#80B3FF" stroke="#4D94FF" stroke-width="2.5"/>

  <!-- Output nodes -->
  <circle cx="158" cy="72"  r="17" fill="#0066FF" stroke="#003EA6" stroke-width="2.5"/>
  <circle cx="158" cy="128" r="17" fill="#0066FF" stroke="#003EA6" stroke-width="2.5"/>

  <!-- Inner glow on output -->
  <circle cx="158" cy="72"  r="7" fill="#E0EEFF" opacity="0.7"/>
  <circle cx="158" cy="128" r="7" fill="#E0EEFF" opacity="0.7"/>
</svg>
